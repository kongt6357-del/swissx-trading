<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwissX Digital Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>SwissX Digital Store</h1>
    <input type="text" id="search" placeholder="Search templates...">
</header>

<section class="products">

    <div class="card">
        <img src="Queen_1.jpg" alt="">
        <h3>Poster Template</h3>
        <p>$3</p>
        <button onclick="showQR()">Download</button>
    </div>

    <div class="card">
        <img src="images/video1.jpg" alt="">
        <h3>Video Template</h3>
        <p>$5</p>
        <button onclick="showQR()">Download</button>
    </div>

    <div class="card">
        <img src="images/font1.jpg" alt="">
        <h3>Font Collection</h3>
        <p>$2</p>
        <button onclick="showQR()">Download</button>
    </div>

</section>

<div id="popup" class="popup">
    <div class="popup-content">
        <span onclick="closeQR()" class="close">&times;</span>
        <h2>Scan ABA QR</h2>
        <img src="IMG_5614.JPG" alt="QR">
        <p>After payment, send screenshot to Telegram.</p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
